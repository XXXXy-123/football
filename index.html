<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>世界杯球星人格测试</title>
  <style>
    :root {
      color-scheme: dark;
      --navy-950: #030816;
      --navy-900: #061326;
      --navy-800: #0b1d39;
      --navy-700: #12305a;
      --gold: #f7c948;
      --gold-deep: #b7832c;
      --field: #0c7a4b;
      --field-bright: #16b978;
      --white: #f8fbff;
      --muted: rgba(226, 236, 255, 0.72);
      --glass: rgba(12, 25, 48, 0.64);
      --glass-strong: rgba(10, 25, 48, 0.78);
      --line: rgba(255, 255, 255, 0.16);
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.4);
      --radius: 18px;
      --card-radius: 22px;
      --ease: cubic-bezier(.2, .8, .2, 1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--navy-950);
    }

    body {
      margin: 0;
      min-height: 100%;
      font-family: "Inter", "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      color: var(--white);
      background:
        radial-gradient(circle at 20% 0%, rgba(247, 201, 72, 0.22), transparent 26rem),
        radial-gradient(circle at 92% 16%, rgba(22, 185, 120, 0.2), transparent 24rem),
        linear-gradient(155deg, #030816 0%, #061326 42%, #09233d 76%, #062b2f 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -2;
    }

    body::before {
      background:
        linear-gradient(90deg, transparent 0 8%, rgba(255, 255, 255, 0.045) 8% 8.3%, transparent 8.3% 91.7%, rgba(255, 255, 255, 0.045) 91.7% 92%, transparent 92%),
        linear-gradient(0deg, transparent 0 11%, rgba(255, 255, 255, 0.04) 11% 11.25%, transparent 11.25% 88.75%, rgba(255, 255, 255, 0.04) 88.75% 89%, transparent 89%),
        radial-gradient(circle at 50% 50%, transparent 0 10.5rem, rgba(255, 255, 255, 0.035) 10.6rem 10.8rem, transparent 10.9rem),
        linear-gradient(90deg, transparent 0 49.8%, rgba(255, 255, 255, 0.035) 49.8% 50.2%, transparent 50.2%);
      opacity: 0.6;
      transform: rotate(-2deg) scale(1.12);
    }

    body::after {
      z-index: -1;
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.12) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(247, 201, 72, 0.16) 0 1px, transparent 1.5px);
      background-size: 34px 34px, 58px 58px;
      background-position: 0 0, 18px 20px;
      mask-image: linear-gradient(to bottom, transparent, black 14%, black 82%, transparent);
      opacity: 0.34;
    }

    button {
      font: inherit;
      color: inherit;
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .app {
      width: min(100%, 520px);
      min-height: 100dvh;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    .shell {
      min-height: calc(100dvh - 32px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 44px;
      gap: 12px;
      margin-bottom: 4px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: 0.82rem;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 0.12em;
    }

    .brand-ball {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 34% 28%, #fff 0 10%, transparent 11%),
        conic-gradient(from 14deg, #f8fbff 0 15%, #08142b 15% 28%, #f8fbff 28% 43%, #08142b 43% 57%, #f8fbff 57% 72%, #08142b 72% 84%, #f8fbff 84% 100%);
      box-shadow: 0 0 20px rgba(247, 201, 72, 0.26);
    }

    .pill {
      border: 1px solid rgba(247, 201, 72, 0.28);
      background: rgba(247, 201, 72, 0.1);
      color: #ffe895;
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .glass-card {
      position: relative;
      border: 1px solid var(--line);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.035)),
        var(--glass);
      backdrop-filter: blur(22px);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.16);
      border-radius: var(--card-radius);
      overflow: hidden;
    }

    .glass-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(110deg, transparent 0 24%, rgba(255, 255, 255, 0.12) 31%, transparent 42% 100%),
        radial-gradient(circle at 0% 0%, rgba(247, 201, 72, 0.14), transparent 20rem);
      opacity: 0.9;
    }

    .hero {
      padding: 30px 22px 22px;
      display: grid;
      gap: 22px;
    }

    .hero-art {
      position: relative;
      height: 236px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background:
        radial-gradient(circle at 68% 26%, rgba(247, 201, 72, 0.22), transparent 5rem),
        radial-gradient(circle at 25% 78%, rgba(22, 185, 120, 0.32), transparent 7rem),
        linear-gradient(150deg, rgba(4, 10, 28, 0.34), rgba(6, 31, 50, 0.94));
      box-shadow: inset 0 0 40px rgba(255, 255, 255, 0.05), 0 18px 34px rgba(0, 0, 0, 0.28);
    }

    .hero-art::before {
      content: "";
      position: absolute;
      inset: 22px;
      border: 2px solid rgba(255, 255, 255, 0.18);
      border-radius: 14px;
    }

    .hero-art::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 22px;
      bottom: 22px;
      width: 2px;
      background: rgba(255, 255, 255, 0.18);
      transform: translateX(-50%);
    }

    .trophy-glow {
      position: absolute;
      left: 50%;
      top: 48%;
      width: 126px;
      height: 168px;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 0 26px rgba(247, 201, 72, 0.48));
      animation: trophyFloat 4.8s var(--ease) infinite;
      z-index: 2;
    }

    .trophy-glow .cup {
      position: absolute;
      left: 50%;
      top: 0;
      width: 82px;
      height: 94px;
      border-radius: 18px 18px 42px 42px;
      background:
        radial-gradient(circle at 36% 18%, #fff2b7, transparent 22%),
        linear-gradient(135deg, #fff5a8 0%, #f7c948 34%, #b7832c 72%, #fff0a3 100%);
      transform: translateX(-50%);
      box-shadow: inset -10px 0 18px rgba(74, 47, 10, 0.22);
    }

    .trophy-glow .cup::before,
    .trophy-glow .cup::after {
      content: "";
      position: absolute;
      top: 18px;
      width: 42px;
      height: 54px;
      border: 9px solid #d8a837;
      border-radius: 50%;
      z-index: -1;
    }

    .trophy-glow .cup::before {
      left: -32px;
    }

    .trophy-glow .cup::after {
      right: -32px;
    }

    .trophy-glow .stem {
      position: absolute;
      left: 50%;
      top: 88px;
      width: 30px;
      height: 38px;
      border-radius: 10px;
      background: linear-gradient(90deg, #a66d20, #f7c948, #8b5a1f);
      transform: translateX(-50%);
    }

    .trophy-glow .base {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 94px;
      height: 28px;
      border-radius: 12px 12px 7px 7px;
      background: linear-gradient(90deg, #6e461d, #e3b341, #6e461d);
      transform: translateX(-50%);
    }

    .orbit {
      position: absolute;
      border: 1px solid rgba(247, 201, 72, 0.2);
      border-radius: 999px;
      inset: 42px 28px;
      transform: rotate(-13deg);
      z-index: 1;
    }

    .spark {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ffe895;
      box-shadow: 0 0 18px rgba(247, 201, 72, 0.75);
      animation: pulse 2.4s ease-in-out infinite;
    }

    .spark.one {
      top: 40px;
      left: 64px;
    }

    .spark.two {
      right: 54px;
      bottom: 70px;
      animation-delay: .7s;
    }

    .spark.three {
      right: 84px;
      top: 74px;
      animation-delay: 1.2s;
    }

    .eyebrow {
      color: #ffe895;
      text-transform: uppercase;
      font-weight: 900;
      font-size: 0.76rem;
      letter-spacing: 0.16em;
      margin: 0 0 10px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 2.28rem;
      line-height: 1.03;
      letter-spacing: 0;
      max-width: 11ch;
    }

    .hero-copy {
      position: relative;
      z-index: 1;
    }

    .hero-text {
      margin-top: 14px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.98rem;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 18px;
    }

    .stat {
      min-height: 78px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.07);
      padding: 10px;
      display: grid;
      align-content: center;
      gap: 4px;
    }

    .stat strong {
      color: #fff4bc;
      font-size: 1.16rem;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.35;
    }

    .primary-btn,
    .ghost-btn,
    .option-btn {
      position: relative;
      isolation: isolate;
      transition: transform .18s var(--ease), border-color .18s var(--ease), background .18s var(--ease), box-shadow .18s var(--ease);
    }

    .primary-btn {
      width: 100%;
      min-height: 56px;
      border-radius: 16px;
      background:
        linear-gradient(135deg, #fff0a3, #f7c948 42%, #b7832c 100%);
      color: #061326;
      font-weight: 950;
      font-size: 1.02rem;
      box-shadow: 0 16px 40px rgba(247, 201, 72, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.58);
    }

    .primary-btn:hover,
    .option-btn:hover,
    .ghost-btn:hover {
      transform: translateY(-1px);
    }

    .primary-btn:active,
    .option-btn:active,
    .ghost-btn:active {
      transform: translateY(1px) scale(0.995);
    }

    .ghost-btn {
      min-height: 46px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.07);
      color: var(--white);
      font-weight: 800;
      padding: 0 14px;
    }

    .quiz {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .progress-wrap {
      display: grid;
      gap: 9px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 750;
    }

    .progress-track {
      height: 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.11);
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--field-bright), var(--gold));
      box-shadow: 0 0 18px rgba(247, 201, 72, 0.35);
      transition: width .36s var(--ease);
    }

    .question-card {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 16px;
    }

    .question-kicker {
      color: #ffe895;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 900;
    }

    .question-title {
      font-size: 1.45rem;
      line-height: 1.22;
      letter-spacing: 0;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option-btn {
      width: 100%;
      min-height: 76px;
      text-align: left;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      background: rgba(255, 255, 255, 0.07);
      padding: 13px 13px 13px 50px;
      display: grid;
      gap: 5px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .option-btn::before {
      content: attr(data-letter);
      position: absolute;
      left: 13px;
      top: 15px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #041121;
      background: linear-gradient(135deg, #fff4bc, var(--gold));
      font-size: 0.82rem;
      font-weight: 950;
      box-shadow: 0 0 16px rgba(247, 201, 72, 0.25);
    }

    .option-btn strong {
      display: block;
      font-size: 0.97rem;
      line-height: 1.34;
      letter-spacing: 0;
    }

    .option-btn span {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.45;
    }

    .option-btn.selected {
      border-color: rgba(247, 201, 72, 0.72);
      background: linear-gradient(135deg, rgba(247, 201, 72, 0.2), rgba(22, 185, 120, 0.1));
      box-shadow: 0 0 26px rgba(247, 201, 72, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    .quiz-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .result {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .player-hero {
      display: grid;
      gap: 15px;
      position: relative;
      z-index: 1;
    }

    .portrait-wrap {
      position: relative;
      min-height: 382px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background:
        radial-gradient(circle at 70% 20%, rgba(247, 201, 72, 0.22), transparent 7rem),
        radial-gradient(circle at 26% 84%, rgba(22, 185, 120, 0.24), transparent 9rem),
        linear-gradient(150deg, rgba(255, 255, 255, 0.08), rgba(4, 12, 26, 0.88));
    }

    .portrait-wrap::before {
      content: "";
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 16px;
    }

    .portrait {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: auto;
      height: 100%;
      max-width: 100%;
      object-fit: contain;
      transform: translateX(-50%);
      filter: drop-shadow(0 28px 32px rgba(0, 0, 0, 0.42));
      animation: portraitIn .7s var(--ease) both;
    }

    .match-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 82px;
      height: 82px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      text-align: center;
      background:
        radial-gradient(circle at 35% 30%, #fff6c3, #f7c948 45%, #9b6727 100%);
      color: #071225;
      font-weight: 950;
      box-shadow: 0 12px 34px rgba(247, 201, 72, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.42);
      z-index: 3;
    }

    .match-badge span {
      display: block;
      font-size: 0.7rem;
      line-height: 1;
    }

    .match-badge strong {
      display: block;
      font-size: 1.28rem;
      line-height: 1.05;
    }

    .result-name {
      display: grid;
      gap: 8px;
    }

    .result-name h2 {
      font-size: 2.25rem;
      line-height: 1;
      letter-spacing: 0;
    }

    .title-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .title-chip {
      border-radius: 999px;
      color: #061326;
      background: linear-gradient(135deg, #fff3ad, #f7c948);
      font-weight: 950;
      padding: 8px 12px;
      font-size: 0.86rem;
    }

    .mbti-chip {
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-weight: 850;
      padding: 8px 11px;
      font-size: 0.82rem;
    }

    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      border: 1px solid rgba(22, 185, 120, 0.34);
      color: #c9ffe6;
      background: rgba(22, 185, 120, 0.1);
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 800;
    }

    .analysis-box {
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.07);
      padding: 16px;
      color: rgba(248, 251, 255, 0.88);
      line-height: 1.78;
      font-size: 0.96rem;
      position: relative;
      z-index: 1;
    }

    .dimension-panel {
      display: grid;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .dimension {
      display: grid;
      gap: 6px;
    }

    .dimension-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 800;
    }

    .dimension-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .dimension-bar i {
      display: block;
      height: 100%;
      width: 50%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--field-bright), var(--gold));
      box-shadow: 0 0 15px rgba(247, 201, 72, 0.2);
    }

    .share-card-wrap {
      display: grid;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .share-card {
      width: 100%;
      max-width: 390px;
      aspect-ratio: 9 / 16;
      margin: 0 auto;
      border-radius: 26px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background:
        radial-gradient(circle at 52% 18%, rgba(247, 201, 72, 0.32), transparent 8rem),
        radial-gradient(circle at 12% 75%, rgba(22, 185, 120, 0.32), transparent 10rem),
        linear-gradient(160deg, #030816 0%, #0a1a33 48%, #083523 100%);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
    }

    .share-card::before {
      content: "";
      position: absolute;
      inset: 20px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 20px;
      pointer-events: none;
    }

    .share-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 0 49.7%, rgba(255, 255, 255, 0.09) 49.7% 50.3%, transparent 50.3%),
        radial-gradient(circle at 50% 49%, transparent 0 66px, rgba(255, 255, 255, 0.1) 67px 68px, transparent 69px);
      opacity: 0.5;
      pointer-events: none;
    }

    .share-inner {
      position: absolute;
      inset: 26px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
      z-index: 1;
    }

    .share-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: rgba(248, 251, 255, 0.74);
      font-weight: 900;
      font-size: 0.72rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .share-main {
      position: relative;
      min-height: 0;
      display: grid;
      align-content: end;
    }

    .share-player {
      position: absolute;
      left: 50%;
      bottom: 23%;
      width: 82%;
      max-height: 58%;
      transform: translateX(-50%);
      object-fit: contain;
      filter: drop-shadow(0 24px 28px rgba(0, 0, 0, 0.48));
    }

    .share-name-block {
      position: relative;
      z-index: 2;
      display: grid;
      gap: 8px;
      padding-bottom: 4px;
    }

    .share-name {
      font-size: 3.45rem;
      line-height: 0.92;
      font-weight: 1000;
      color: #fff4bc;
      text-shadow: 0 0 24px rgba(247, 201, 72, 0.32);
      letter-spacing: 0;
      word-break: keep-all;
    }

    .share-title {
      color: var(--white);
      font-weight: 950;
      font-size: 1.12rem;
    }

    .share-bottom {
      display: grid;
      gap: 12px;
    }

    .share-match {
      display: flex;
      justify-content: space-between;
      align-items: end;
      border-top: 1px solid rgba(255, 255, 255, 0.16);
      padding-top: 12px;
    }

    .share-match span {
      color: rgba(248, 251, 255, 0.72);
      font-weight: 850;
      font-size: 0.82rem;
    }

    .share-match strong {
      color: #fff4bc;
      font-size: 2.2rem;
      line-height: 1;
    }

    .share-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .share-tags span {
      color: #c9ffe6;
      border: 1px solid rgba(22, 185, 120, 0.36);
      background: rgba(22, 185, 120, 0.12);
      border-radius: 999px;
      padding: 6px 8px;
      font-size: 0.72rem;
      font-weight: 850;
    }

    .share-quote {
      color: rgba(248, 251, 255, 0.9);
      font-weight: 900;
      line-height: 1.55;
      font-size: 0.96rem;
    }

    .canvas-output {
      width: 100%;

    function renderQuestion() {
      const question = questions[state.current];
      const percent = Math.round(((state.current + 1) / questions.length) * 100);
      questionCount.textContent = `第 ${state.current + 1} / ${questions.length} 题`;
      progressLabel.textContent = `${percent}%`;
      progressFill.style.width = `${percent}%`;
      questionKicker.textContent = question.kicker;
      questionTitle.textContent = question.title;
      prevBtn.disabled = state.current === 0;
      optionsEl.innerHTML = "";

      question.options.forEach((option, index) => {
        const button = document.createElement("button");
        button.className = "option-btn";
        button.dataset.letter = "ABCD"[index];
        button.innerHTML = `<strong>${option.text}</strong><span>${option.sub}</span>`;
        if (state.answers[state.current] === index) {
          button.classList.add("selected");
        }
        button.addEventListener("click", () => chooseOption(index, button));
        optionsEl.appendChild(button);
      });
    }

    function chooseOption(index, button) {
      state.answers[state.current] = index;
      [...optionsEl.children].forEach((el) => el.classList.remove("selected"));
      button.classList.add("selected");

      window.setTimeout(() => {
        if (state.current < questions.length - 1) {
          state.current += 1;
          renderQuestion();
        } else {
          calculateResult();
          renderResult();
          showScreen(resultScreen);
        }
      }, 210);
    }

    function goPrev() {
      if (state.current === 0) return;
      state.current -= 1;
      renderQuestion();

    function calculateResult() {
      const totals = { d: 0, s: 0, p: 0, a: 0, r: 0 };
      state.answers.forEach((answerIndex, questionIndex) => {
        const answer = questions[questionIndex].options[answerIndex];
        dims.forEach(({ key }) => {
          totals[key] += answer.score[key];
        });
      });

      const userVector = {};
      dims.forEach(({ key }) => {
        userVector[key] = totals[key] / state.answers.length;
      });

      let best = null;
      players.forEach((player) => {
        let score = 0;
        dims.forEach(({ key }) => {
          const similarity = 1 - Math.abs(userVector[key] - player.profile[key]) / 4;
          score += weights[key] * Math.max(0, similarity);
        });
        const match = Math.round((score * 100 + 8) / 1.08);
        const normalized = Math.max(68, Math.min(99, match));
        if (!best || normalized > best.match) {
          best = { ...player, match: normalized };
        }
      });

      state.result = best;
      state.userVector = userVector;
    }

      const response = await fetch(endpoint, { mode: "cors" });
      if (!response.ok) throw new Error(`Photo lookup failed: ${response.status}`);
      const data = await response.json();
      const source = data.originalimage?.source || data.thumbnail?.source;
      if (!source) throw new Error("Missing player thumbnail");
      return source;

      for (let i = 0; i < 5; i += 1) {
        const a = -Math.PI / 2 + i * Math.PI * 2 / 5;
        const px = Math.cos(a) * r * 0.36;
        const py = Math.sin(a) * r * 0.36;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();

      ctx.strokeStyle = "#111";

    function drawImageCover(ctx, image, x, y, w, h, focusY = 0.28, zoom = 1) {
      const iw = image.naturalWidth || image.width;
      const ih = image.naturalHeight || image.height;
      const scale = Math.max(w / iw, h / ih) * zoom;
      const sw = w / scale;
      const sh = h / scale;
      const sx = Math.max(0, Math.min(iw - sw, (iw - sw) / 2));
      const targetY = ih * focusY - sh * 0.26;
      const sy = Math.max(0, Math.min(ih - sh, targetY));
      ctx.drawImage(image, sx, sy, sw, sh, x, y, w, h);
    }

    function hexToRgb(hex) {
      const clean = hex.replace("#", "");
      return {
        r: parseInt(clean.slice(0, 2), 16),
        g: parseInt(clean.slice(2, 4), 16),
        b: parseInt(clean.slice(4, 6), 16)
      };
    }

    function rgbToHex({ r, g, b }) {
      return `#${[r, g, b].map((v) => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, "0")).join("")}`;
    }

    function lighten(hex, amount) {
      const rgb = hexToRgb(hex);
      return rgbToHex({ r: rgb.r + amount, g: rgb.g + amount, b: rgb.b + amount });
    }

    function darken(hex, amount) {
      const rgb = hexToRgb(hex);
      return rgbToHex({ r: rgb.r - amount, g: rgb.g - amount, b: rgb.b - amount });
    }

    async function downloadShareCard() {
      const player = state.result;
      if (!player) return;
      const canvas = $("#shareCanvas");
      const ctx = canvas.getContext("2d");
      await drawShareCanvas(ctx, player, canvas.width, canvas.height);
      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `worldcup-persona-${player.id}.png`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }, "image/png", 0.94);
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        if (/^https?:\/\//.test(src)) {
          image.crossOrigin = "anonymous";
        }
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = src;
      });
    }

    async function drawShareCanvas(ctx, player, width, height) {
      ctx.clearRect(0, 0, width, height);
      const bg = ctx.createLinearGradient(0, 0, width, height);
      bg.addColorStop(0, "#030816");
      bg.addColorStop(0.48, "#0a1a33");
      bg.addColorStop(1, "#083523");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, width, height);

      drawGlow(ctx, width * 0.52, height * 0.17, 360, "rgba(247, 201, 72, .36)");
      drawGlow(ctx, width * 0.12, height * 0.75, 410, "rgba(22, 185, 120, .32)");
      drawPitchLines(ctx, width, height);
      drawRoundedStroke(ctx, 62, 62, width - 124, height - 124, 54, "rgba(255,255,255,.16)", 3);

      ctx.save();
      ctx.globalAlpha = 0.9;
      const portrait = await loadImage(await getAvatar(player));
      const imageW = 720;
      const imageH = imageW * (portrait.naturalHeight / portrait.naturalWidth);
      ctx.drawImage(portrait, (width - imageW) / 2, 244, imageW, imageH);
      ctx.restore();

      ctx.fillStyle = "rgba(248,251,255,.76)";
      ctx.font = "900 34px Arial, sans-serif";
      ctx.letterSpacing = "0px";
      ctx.fillText("WORLD CUP PERSONA", 82, 128);

      ctx.textAlign = "right";
      ctx.fillStyle = "#fff2a6";
      ctx.font = "950 42px Arial, sans-serif";
      ctx.fillText(`${player.match}%`, width - 82, 128);
      ctx.textAlign = "left";

      ctx.fillStyle = "#fff4bc";
      fitText(ctx, player.name, 82, 1246, width - 164, 138, "1000", "Arial, sans-serif");

      ctx.fillStyle = "#f8fbff";
      ctx.font = "950 54px Arial, sans-serif";
      ctx.fillText(player.title, 86, 1360);

      ctx.strokeStyle = "rgba(255,255,255,.18)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(82, 1430);
      ctx.lineTo(width - 82, 1430);
      ctx.stroke();

      ctx.fillStyle = "rgba(248,251,255,.72)";
      ctx.font = "850 34px Arial, sans-serif";
      ctx.fillText("匹配度", 84, 1508);
      ctx.textAlign = "right";
      ctx.fillStyle = "#fff4bc";
      ctx.font = "1000 92px Arial, sans-serif";
      ctx.fillText(`${player.match}%`, width - 84, 1516);
      ctx.textAlign = "left";

      drawCanvasTags(ctx, player.tags, 84, 1580, width - 168);

      ctx.fillStyle = "rgba(248,251,255,.92)";
      ctx.font = "900 42px Arial, sans-serif";
      wrapText(ctx, player.quote, 84, 1740, width - 168, 62, 2);
    }

    function drawGlow(ctx, x, y, radius, color) {
      const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
      gradient.addColorStop(0, color);
      gradient.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawPitchLines(ctx, width, height) {
      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 4;
      ctx.strokeRect(80, 160, width - 160, height - 320);
      ctx.beginPath();
      ctx.moveTo(width / 2, 160);
      ctx.lineTo(width / 2, height - 160);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(width / 2, height / 2, 150, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawRoundedStroke(ctx, x, y, w, h, r, color, lineWidth) {
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      roundedPath(ctx, x, y, w, h, r);
      ctx.stroke();
      ctx.restore();
    }

    function roundedPath(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawCanvasTags(ctx, tags, x, y, maxWidth) {
      let cursorX = x;
      let cursorY = y;
      ctx.font = "850 31px Arial, sans-serif";
      tags.slice(0, 5).forEach((tag) => {
        const textW = ctx.measureText(tag).width;
        const pillW = textW + 42;
        if (cursorX + pillW > x + maxWidth) {
          cursorX = x;
          cursorY += 62;
        }
        ctx.fillStyle = "rgba(22,185,120,.14)";
        roundedPath(ctx, cursorX, cursorY, pillW, 44, 22);
        ctx.fill();
        ctx.strokeStyle = "rgba(22,185,120,.38)";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = "#c9ffe6";
        ctx.fillText(tag, cursorX + 21, cursorY + 31);
        cursorX += pillW + 16;
      });
    }

    function fitText(ctx, text, x, y, maxWidth, maxSize, weight, family) {
      let size = maxSize;
      do {
        ctx.font = `${weight} ${size}px ${family}`;
        size -= 2;
      } while (ctx.measureText(text).width > maxWidth && size > 56);
      ctx.fillText(text, x, y);
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
      const chars = [...text];
      let line = "";
      let lines = [];
      chars.forEach((char) => {
        const test = line + char;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = char;
        } else {
          line = test;
        }
      });
      if (line) lines.push(line);
      lines = lines.slice(0, maxLines);
      lines.forEach((lineText, index) => {
        ctx.fillText(lineText, x, y + index * lineHeight);
      });
    }
